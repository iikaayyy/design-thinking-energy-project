<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup | WattBuddy</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main class="details-page">

        <section class="form-card">
            <h1>Set Up Your Energy Profile</h1>

            <p>
                Answer a few optional questions so WattBuddy can better understand your household energy habits.
            </p>

            <form action="dashboard.html" method="get" class="setup-form">

                <label for="name">Your name</label>
                <input type="text" id="name" name="name" placeholder="e.g. Khushi">

                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="e.g. khushi@email.com">

                <label for="rooms">Number of rooms in your home</label>
                <select id="rooms" name="rooms">
                    <option value="">Choose one</option>
                    <option>1-2 rooms</option>
                    <option>3-4 rooms</option>
                    <option>5-6 rooms</option>
                    <option>7+ rooms</option>
                </select>

                <label for="weather">What is your usual weather like?</label>
                <select id="weather" name="weather">
                    <option value="">Choose one</option>
                    <option>Mostly hot</option>
                    <option>Mostly cold</option>
                    <option>Mixed weather</option>
                    <option>Not sure</option>
                </select>

                <label for="temperature-use">Do you use heating or air conditioning often?</label>
                <select id="temperature-use" name="temperature-use">
                    <option value="">Choose one</option>
                    <option>Air conditioning often</option>
                    <option>Heating often</option>
                    <option>Both depending on weather</option>
                    <option>Rarely use either</option>
                </select>

                <label for="average-use">Current average energy use</label>
                <input type="text" id="average-use" name="average-use" placeholder="e.g. 18 kWh per day">

                <label for="appliances">Heavy appliances used regularly</label>
                <select id="appliances" name="appliances">
                    <option value="">Choose one</option>
                    <option>Washing machine / dryer</option>
                    <option>Air conditioner / heater</option>
                    <option>Gaming PC / large TV setup</option>
                    <option>Multiple heavy appliances</option>
                    <option>Not sure</option>
                </select>

                <label for="goal">Main energy goal</label>
                <select id="goal" name="goal">
                    <option value="">Choose one</option>
                    <option>Save money on bills</option>
                    <option>Reduce overall energy use</option>
                    <option>Track high-usage appliances</option>
                    <option>Build better daily habits</option>
                    <option>Reduce environmental impact</option>
                </select>

                <button type="submit" class="primary-btn">Continue to Dashboard</button>

                <a href="dashboard.html" class="skip-link">Skip for now</a>

            </form>
        </section>

        <div class="or-divider">
            <span>OR</span>
        </div>

        <div class="quick-access-buttons">
            <button class="email-btn" type="button" id="show-email-login-btn">
                Login with Email
            </button>
        </div>

        <section class="email-login-section hidden" id="email-login-section">
            <h2>Login with Email</h2>

            <p>
                Enter the email address you used when setting up your WattBuddy profile.
            </p>

            <form class="email-login-form" id="email-login-form">
                <label for="login-email">Email address</label>
                <input type="email" id="login-email" name="login-email" placeholder="e.g. khushi@email.com">

                <p class="form-error-message" id="login-error-message"></p>

                <button type="submit" class="primary-btn">Login</button>
                <button type="button" class="secondary-btn" id="back-to-setup-btn">Back to Setup</button>
            </form>
        </section>

    </main>
    <script src="js/script.js"></script>
</body>
</html>
