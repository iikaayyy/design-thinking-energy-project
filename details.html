<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup | WattBuddy</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <main class="details-page">

        <section class="form-card">
            <h1>Set Up Your Energy Profile</h1>

            <p>
                Tell us a little about your household so WattBuddy can personalise your dashboard.
            </p>

            <form action="dashboard.html" method="get" class="setup-form">

                <label for="name">Your name</label>
                <input type="text" id="name" name="name" placeholder="e.g. Khushi">

                <label for="household">Household size</label>
                <select id="household" name="household">
                    <option value="">Choose one</option>
                    <option>1 person</option>
                    <option>2 people</option>
                    <option>3-4 people</option>
                    <option>5+ people</option>
                </select>

                <label for="goal">Main energy goal</label>
                <select id="goal" name="goal">
                    <option value="">Choose one</option>
                    <option>Save money</option>
                    <option>Reduce energy use</option>
                    <option>Build better habits</option>
                    <option>Help the environment</option>
                </select>

                <label for="usage">Current usage level</label>
                <select id="usage" name="usage">
                    <option value="">Choose one</option>
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                    <option>Not sure</option>
                </select>

                <button type="submit" class="primary-btn">Continue to Dashboard</button>

                <a href="dashboard.html" class="skip-link">Skip for now</a>
            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <p>&copy; 2026 WattBuddy. Created for 2008ICT Design Thinking in IT.</p>
    </footer>
</body>
</html>
